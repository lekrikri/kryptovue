global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: kryptovue
    static_configs:
      - targets:
          - ingester:9100
          - aggregator:9100
          - api:9100
        labels:
          project: kryptovue

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
