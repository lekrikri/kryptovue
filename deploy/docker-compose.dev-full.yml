name: kryptovue-dev-full

# Stack complète en local : build de tous les services + front + infra.
# Redémarrage automatique (restart: unless-stopped) → plus de service qui « disparaît ».
# Usage : docker compose -f deploy/docker-compose.dev-full.yml up -d --build
# Le worker IA utilise le lexique par défaut ; passe SENTIMENT_BACKEND=llm pour Qwen.

x-go-build: &go-build
  build:
    context: ..
    dockerfile: Dockerfile

x-service-env: &service-env
  KAFKA_BROKERS: redpanda:9092
  KAFKA_TRADES_TOPIC: crypto.trades
  DATABASE_URL: postgres://kryptovue:kryptovue@timescaledb:5432/kryptovue

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --mode dev-container
      - --smp 1
      - --memory 1G
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: kryptovue
      POSTGRES_PASSWORD: kryptovue
      POSTGRES_DB: kryptovue
    ports:
      - "5434:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kryptovue"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingester:
    <<: *go-build
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: ingester
    environment: *service-env
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  aggregator:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: aggregator
    environment: *service-env
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  metadata:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: metadata
    environment:
      <<: *service-env
      META_POLL_SECONDS: "300"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  ai-worker:
    build:
      context: ../ai-worker
    environment:
      DATABASE_URL: postgres://kryptovue:kryptovue@timescaledb:5432/kryptovue
      POLL_SECONDS: "600"
      SENTIMENT_BACKEND: ${SENTIMENT_BACKEND:-lexicon}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    environment:
      <<: *service-env
      API_PORT: "8080"
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8080"
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8082
    environment:
      API_URL: http://api:8080
    ports:
      - "3006:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redpanda-data:
  timescale-data:
