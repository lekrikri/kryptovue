name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Fichiers non formatés :"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2025.1"
          install-go: false

      - name: Tests
        run: go test ./... -count=1 -race

      - name: Build
        run: go build ./...

  docker:
    name: Docker build (validation)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingester, aggregator, api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SERVICE=${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
